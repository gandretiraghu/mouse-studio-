name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build (debug)
        run: swift build -v

      - name: Run tests
        run: swift test -v

  release:
    name: Release (prerelease build)
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Package .app bundles + .dmg installer
        id: package
        run: |
          set -euo pipefail
          VERSION="0.1.${{ github.run_number }}"
          chmod +x Installer/*.sh
          Installer/package.sh "$VERSION"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset=dist/MouseStudio-${VERSION}.dmg" >> "$GITHUB_OUTPUT"
          ls -la dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.package.outputs.version }}"
          TAG="v${VERSION}"
          NOTES="Automated prerelease build from commit ${GITHUB_SHA}.

          Contains a .dmg with the Mouse Studio GUI app and the background service,
          plus Install/Uninstall helpers.

          - Native Swift automation engine + config layer + actions
          - Background service (menu bar) with Unix-socket IPC
          - SwiftUI settings app (rules, wizard, action browser, live tester, backup)
          - Device profiles: ANT GM100 + generic 3/5-button

          Ad-hoc signed (not notarized): right-click the app and choose Open on first launch."
          gh release create "$TAG" "${{ steps.package.outputs.asset }}" \
            --title "Mouse Studio $TAG" \
            --notes "$NOTES" \
            --prerelease \
            --target "$GITHUB_SHA"
