name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build (debug)
        run: swift build -v

      - name: Run tests
        run: swift test -v

  release:
    name: Release (prerelease build)
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build (release)
        run: swift build -c release -v

      - name: Package artifacts
        id: package
        run: |
          set -euo pipefail
          VERSION="0.1.${{ github.run_number }}"
          BIN_DIR="$(swift build -c release --show-bin-path)"
          STAGE="MouseStudio-${VERSION}"
          mkdir -p "dist/${STAGE}/bin" "dist/${STAGE}/DeviceProfiles"
          # Compiled binaries (CLI service + GUI scaffold; full .app comes in a later phase)
          cp "${BIN_DIR}/mousestudio-service" "dist/${STAGE}/bin/" 2>/dev/null || true
          cp "${BIN_DIR}/mousestudio-gui" "dist/${STAGE}/bin/" 2>/dev/null || true
          cp DeviceProfiles/*.json "dist/${STAGE}/DeviceProfiles/"
          cp README.md LICENSE "dist/${STAGE}/"
          ( cd dist && zip -r "${STAGE}.zip" "${STAGE}" >/dev/null )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset=dist/${STAGE}.zip" >> "$GITHUB_OUTPUT"
          ls -la dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.package.outputs.version }}"
          TAG="v${VERSION}"
          NOTES="Automated prerelease build from commit ${GITHUB_SHA}.

          Contains compiled binaries for the Mouse Studio background service and the
          GUI scaffold. This is an early Phase 1 build (core engine); the full native
          .app and installer arrive in later phases.

          - Core automation engine (state machine, rule engine, dispatcher)
          - Device profiles: ANT GM100 + generic 3/5-button
          "
          gh release create "$TAG" "${{ steps.package.outputs.asset }}" \
            --title "Mouse Studio $TAG" \
            --notes "$NOTES" \
            --prerelease \
            --target "$GITHUB_SHA"
